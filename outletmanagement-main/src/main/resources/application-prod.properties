# ─── Mailtrap / SMTP Configuration ───────────────────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.mailtrap.io}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USER:abcf4f8b5be026}
spring.mail.password=${SMTP_PASSWORD:84550cc61905c1}
