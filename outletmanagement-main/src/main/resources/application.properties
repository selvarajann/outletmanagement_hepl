spring.application.name=outletmanagement
server.port=8080

# Sarvam AI Chatbot Properties
sarvam.ai.api-key=sk_zbevl6xz_UenptLUfyWczvKqZROZl72Tg
sarvam.ai.base-url=https://api.sarvam.ai/v1/chat/completions
chatbot.system-prompt=You are a helpful and professional AI assistant for the Outlet Management System. You can help users understand stock orders, batches, products, outlets, divisions, inventory management, notifications, roles, and IMS integration. Provide clear, concise, and accurate answers based on the Outlet Management domain.

spring.datasource.url=jdbc:mysql://localhost:3306/outlet_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Hibernate batch fetching \u2014 reduces remaining lazy-load queries to batches of 25
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

spring.jackson.default-property-inclusion=non_null

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/v3/api-docs
springdoc.override-with-generic-response=false
server.forward-headers-strategy=framework
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

# Multipart file upload limits (CSV import)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Product image upload directory
app.upload.dir=uploads/products
app.report.dir=uploads/reports

# \u2500\u2500 Interceptor / Filter Configuration \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500

# Rate Limiting (Bucket4j + Caffeine \u2014 per client IP, token bucket algorithm)
app.rate-limit.max-requests=100
app.rate-limit.refill-seconds=60

# Performance Monitoring (AOP \u2014 @Service methods slower than threshold logged as WARN)
app.performance.slow-service-threshold-ms=500

# Audit Log Retention (AuditCleanupScheduler purges records older than this many days)
app.audit.retain-days=90

# Deprecated API Paths (comma-separated URI patterns; ApiDeprecationInterceptor adds RFC 8594 headers)
app.api.deprecated-paths=/api/products/old,/api/divisions/legacy
spring.data.redis.host=localhost
spring.data.redis.port=6379

